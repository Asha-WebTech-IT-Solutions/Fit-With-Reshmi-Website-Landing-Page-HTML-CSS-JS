<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed | Fit With Reshmi</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Outfit',sans-serif;
background:#FFF5F8;
text-align:center;
padding:50px 20px;
margin:0;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
color:#E91E63;
font-size:36px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:25px;
}

/* Calendly */

#calendly-container{
width:100%;
min-width:320px;
height:950px;
}

/* Download section */

#download-section{
display:none;
margin-bottom:30px;
padding:30px;
background:#FFF0F5;
border-radius:12px;
}

.download-btn{
display:inline-block;
background:#E91E63;
color:#fff;
padding:15px 30px;
border-radius:8px;
text-decoration:none;
font-weight:600;
margin-top:15px;
font-size:18px;
}

.download-btn:hover{
background:#d81b60;
}

</style>

<!-- Facebook Pixel -->

<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '1204782934874733');
fbq('track', 'PageView');

if (!sessionStorage.getItem("purchase_tracked")) {

    fbq('track', 'Purchase', {
        value: 199,
        currency: 'INR',
        content_name: 'PCOS Consultation'
    }, {
        eventID: 'purchase_' + Date.now()
    });

    sessionStorage.setItem("purchase_tracked", "true");
}
</script>

</head>

<body>

<div class="container">

<h1>✅ Payment Successful</h1>

<p>
Your consultation is confirmed.  
Please book your time slot below.
</p>

<!-- DOWNLOAD SECTION (TOP) -->

<div id="download-section">

<h2 style="color:#E91E63;">🎉 Your Call is Booked!</h2>

<p>
Important: Download your <strong>PCOS Healing Bundle</strong> before leaving this page.
</p>

<a href="https://fitwithreshmi.com/booking-complete.html" class="download-btn">
Download PCOS Bundle
</a>

</div>

<!-- Calendly widget -->

<div id="calendly-container"></div>

<script src="https://assets.calendly.com/assets/external/widget.js"></script>

<script>

window.onload = function() {
Calendly.initInlineWidget({
url: 'https://calendly.com/fitwithreshmii/15min?hide_gdpr_banner=1',
parentElement: document.getElementById('calendly-container')
});
};

/* Detect booking completion */

window.addEventListener('message', function(e) {

if (e.data.event && e.data.event.indexOf('calendly.event_scheduled') === 0) {

var section = document.getElementById("download-section");

section.style.display = "block";

/* Scroll user to the top */

window.scrollTo({
top:0,
behavior:"smooth"
});

/* Facebook booking event */

fbq('track','Schedule', {
content_name: 'PCOS Consultation Booking'
});

}

});

</script>

</div>

</body>
</html>
